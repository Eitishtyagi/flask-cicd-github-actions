<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Todo App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3>📝My Todo App</h3>
            <small>Server: {{ host }}</small>
        </div>
        <div class="card-body">
            <form action="/add" method="POST" class="d-flex gap-2 mb-4">
                <input type="text" name="task" class="form-control" placeholder="Naya task likho..." required>
                <button type="submit" class="btn btn-success">Add</button>
            </form>
            <ul class="list-group">
                {% for todo in todos %}
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <span style="{% if todo.done %}text-decoration: line-through; color: grey;{% endif %}">
                        {{ todo.task }}
                    </span>
                    <div class="d-flex gap-2">
                        <a href="/done/{{ todo.id }}" class="btn btn-sm btn-success">✅</a>
                        <a href="/delete/{{ todo.id }}" class="btn btn-sm btn-danger">🗑️</a>
                    </div>
                </li>
                {% endfor %}
            </ul>
            {% if todos|length == 0 %}
            <p class="text-center text-muted mt-3">Koi task nahi — upar se add karo! 👆</p>
            {% endif %}
        </div>
        <div class="card-footer text-muted text-center">
            Total Tasks: {{ todos|length }}
        </div>
    </div>
</div>
</body>
</html>
