name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build and Push Docker Image to ECR
      run: |
        docker build -t flask-app .
        docker tag flask-app:latest 367709774709.dkr.ecr.us-east-1.amazonaws.com/flask-app:${{ github.sha }}
        docker tag flask-app:latest 367709774709.dkr.ecr.us-east-1.amazonaws.com/flask-app:latest
        docker push 367709774709.dkr.ecr.us-east-1.amazonaws.com/flask-app:${{ github.sha }}
        docker push 367709774709.dkr.ecr.us-east-1.amazonaws.com/flask-app:latest

    - name: ASG Instance Refresh
      run: aws autoscaling start-instance-refresh --auto-scaling-group-name flask-asg --region us-east-1
